<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Frontend Effects Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        iframe { border: none; width: 100%; height: 100%; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<div id="app" class="p-8">
    <header class="mb-12 border-b border-gray-800 pb-6">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            团队前端特效库
        </h1>
       <p class="text-gray-400 mt-2">共积攒了 <span id="effect-count">0</span> 个动效作品</p>

<div id="effects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
    </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div v-for="item in effects" :key="item.id" 
             class="glass border border-gray-700 p-4 rounded-xl hover:border-blue-500 transition-all cursor-pointer group"
             @click="openPreview(item)">
            <div class="h-48 bg-gray-800 rounded-lg mb-4 overflow-hidden relative">
                <iframe :src="item.path" class="pointer-events-none scale-75 origin-top"></iframe>
                <div class="absolute inset-0 bg-black bg-opacity-20 group-hover:bg-opacity-0 transition-all"></div>
            </div>
            <h3 class="text-lg font-semibold">{{ item.title }}</h3>
            <div class="flex gap-2 mt-2">
                <span v-for="tag in item.tags" class="text-xs px-2 py-1 bg-gray-700 rounded text-gray-300">
                    {{ tag }}
                </span>
            </div>
        </div>
    </div>

    <div v-if="activeEffect" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-90">
        <div class="w-full h-full flex flex-col glass rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold">{{ activeEffect.title }}</h2>
                <div class="flex gap-4">
                    <button @click="copyCode" class="text-sm bg-blue-600 px-4 py-2 rounded">复制代码</button>
                    <button @click="activeEffect = null" class="text-xl">✕</button>
                </div>
            </div>
            <div class="flex-1 bg-white">
                <iframe :src="activeEffect.path"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
async function loadEffects() {
    const container = document.getElementById('effects-container');
    const countEl = document.getElementById('effect-count');

    try {
        // 获取数据，使用相对路径确保在 GitHub Pages 正常
        const response = await fetch('./data.json');
        if (!response.ok) throw new Error('无法加载数据');
        
        const data = await response.json();
        
        // 更新数字
        if (countEl) countEl.innerText = data.length;

        // 生成卡片 HTML
        if (container) {
            container.innerHTML = data.map(item => `
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-all">
                    <h3 class="text-xl font-bold text-gray-800">${item.title}</h3>
                    <div class="flex gap-2 mt-2">
                        ${item.tags.map(tag => `<span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded">${tag}</span>`).join('')}
                    </div>
                    <p class="text-gray-500 mt-3 text-sm line-clamp-2">${item.description}</p>
                    <a href="${item.path}" class="inline-block mt-4 text-blue-500 font-medium hover:text-blue-700">
                        查看演示 →
                    </a>
                </div>
            `).join('');
        }
    } catch (err) {
        console.error('渲染出错:', err);
        if (container) container.innerHTML = `<p class="text-red-400">加载失败，请刷新重试</p>`;
    }
}

// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', loadEffects);
</script>
</body>
</html>
