name: Build and Deploy Gallery

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 关键点：不仅要检出代码，还要允许追踪新生成的文件
          persist-credentials: false 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Data
        run: |
          node scripts/generate-index.js
          # 调试命令：确保文件真的在这里生成了
          ls -lh data.json 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录下所有文件
          branch: gh-pages # 部署到这个分支
          clean: true # 自动清理旧文件
