name: Build and Deploy Gallery

on:
  push:
    branches:
      - main # 确保这是你的主分支名字

permissions:
  contents: write # 解决 403 Permission Denied 的关键！

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Data
        run: node scripts/generate-index.js # 确保路径和文件名完全对应

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 表示部署整个仓库目录，如果你的成品都在 dist 里，请改为 dist
          branch: gh-pages
