name: Build and Deploy Gallery

on:
  push:
    branches: [ main ] # 只有代码推送到主分支时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate Effects Index
        run: node scripts/generate-index.js # 运行扫描脚本

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 将整个项目部署到 Pages
