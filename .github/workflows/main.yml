name: Build and Deploy Gallery

on:
  push:
    branches: [ main ] # 只有代码推送到主分支时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Debug and Run
        run: |
          echo "=== 正在检查 scripts 目录下的文件 ==="
          ls -F scripts/
          echo "=== 正在运行脚本 ==="
          # 如果你的文件叫 generate-index.js，就填下面这个；如果叫 data，就填 data
          node scripts/generate-index.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 将整个项目部署到 Pages
